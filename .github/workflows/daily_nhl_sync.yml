name: NHL Daily and Catchup Sync
on:
  workflow_dispatch:

jobs:
  scrape_and_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Raw Linux Build and Execution
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # 1. DELETE ANY POTENTIAL CACHE OR CONFLICTING PACKAGES
          python3 -m pip cache purge
          
          # 2. CREATE A BRAND NEW VIRTUAL ENVIRONMENT FROM SCRATCH
          # Using an unusual name to ensure no collision with existing folders
          python3 -m venv build_env
          
          # 3. LOCK THE BINARY PATH
          export VENV_BIN=$GITHUB_WORKSPACE/build_env/bin
          
          # 4. INSTALL INDIVIDUALLY AND LOG EVERY BYTE
          # We do not chain these with &&. Each must stand on its own.
          $VENV_BIN/python -m pip install --upgrade pip
          $VENV_BIN/python -m pip install selectolax
          $VENV_BIN/python -m pip install xgboost
          $VENV_BIN/python -m pip install joblib
          $VENV_BIN/python -m pip install pandas sqlalchemy psycopg2-binary requests beautifulsoup4 lxml polars numpy
          
          # 5. THE "NO BULLSHIT" VERIFICATION
          # This will either print the path or the entire job will FAIL RED right here
          echo "--- STARTING SYSTEM VERIFICATION ---"
          $VENV_BIN/python -c "import selectolax; print('VERIFIED: selectolax is at', selectolax.__file__)"
          $VENV_BIN/python -c "import xgboost; print('VERIFIED: xgboost is at', xgboost.__file__)"
          
          # 6. EXECUTION
          export PYTHONPATH=$GITHUB_WORKSPACE
          $VENV_BIN/python -u season_orchestrator.py