name: NHL Daily and Catchup Sync
on:
  workflow_dispatch:

jobs:
  scrape_and_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Granular Installation
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # 1. Prepare environment
          python3 -m venv test_env
          V_PY=$GITHUB_WORKSPACE/test_env/bin/python
          $V_PY -m pip install --upgrade pip setuptools wheel

          # 2. INSTALL SELECTOLAX BY ITSELF
          echo "--- ATTEMPTING SELECTOLAX INSTALL ---"
          $V_PY -m pip install selectolax
          
          # 3. VERIFY IMMEDIATELY
          echo "--- VERIFYING SELECTOLAX ---"
          $V_PY -c "import selectolax; print('SUCCESS: selectolax is at', selectolax.__file__)"

          # 4. INSTALL THE REST
          echo "--- INSTALLING REMAINING PACKAGES ---"
          $V_PY -m pip install xgboost joblib pandas sqlalchemy psycopg2-binary requests beautifulsoup4 lxml polars numpy
          
          # 5. EXECUTE
          export PYTHONPATH=$GITHUB_WORKSPACE
          $V_PY -u season_orchestrator.py