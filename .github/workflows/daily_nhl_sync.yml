name: NHL Daily and Catchup Sync

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  scrape_and_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Environment and Sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # 1. Install Linux dependencies for C-compilation
          sudo apt-get update
          sudo apt-get install -y python3-venv python3-dev build-essential

          # 2. Create and activate a fresh, isolated virtual environment
          python3 -m venv .venv
          source .venv/bin/activate

          # 3. Use ONLY the internal pip to install EVERY dependency
          python3 -m pip install --upgrade pip
          python3 -m pip install \
            pandas \
            sqlalchemy \
            psycopg2-binary \
            requests \
            beautifulsoup4 \
            lxml \
            polars \
            numpy \
            selectolax \
            xgboost \
            joblib

          # 4. CRITICAL VERIFICATION: Prove everything is importable
          echo "--- VERIFYING ENVIRONMENT ---"
          python3 -c "import selectolax; import xgboost; import joblib; print('VERIFIED: All libraries found.')"
          
          # 5. Set PYTHONPATH to include the root (where main_runner lives)
          export PYTHONPATH=$GITHUB_WORKSPACE
          echo "PYTHONPATH set to: $PYTHONPATH"

          # 6. Run the script using the VENV's python
          python3 -u season_orchestrator.py