name: NHL Daily and Catchup Sync
on:
  workflow_dispatch:

jobs:
  scrape_and_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build and Run
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          # 1. Install Linux compilation tools
          sudo apt-get update
          sudo apt-get install -y python3-venv python3-dev build-essential

          # 2. Create and lock into a virtual environment
          python3 -m venv .venv
          source .venv/bin/activate

          # 3. INSTALLING ONE BY ONE TO PREVENT SILENT FAILURE
          python3 -m pip install --upgrade pip
          python3 -m pip install selectolax
          python3 -m pip install xgboost
          python3 -m pip install joblib
          python3 -m pip install pandas sqlalchemy psycopg2-binary requests beautifulsoup4 lxml polars numpy

          # 4. VERIFY - THIS MUST PASS
          echo "--- FINAL ENVIRONMENT CHECK ---"
          python3 -c "import selectolax; print('SUCCESS: selectolax is ready')"
          python3 -c "import xgboost; print('SUCCESS: xgboost is ready')"
          
          # 5. EXECUTE
          export PYTHONPATH=$GITHUB_WORKSPACE
          python3 -u season_orchestrator.py