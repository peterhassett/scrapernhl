name: NHL Daily and Catchup Sync

on:
  schedule:
    # Runs at 10:00 UTC (approx 5:00 AM EST) every day
    - cron: '0 10 * * *'
  # Enables the "Run workflow" button in the Actions tab
  workflow_dispatch:

jobs:
  scrape_and_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Speeds up future runs by caching these heavy libraries

      - name: Install and Run Sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Ensures Python treats the root and /scrapernhl as accessible packages
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # 1. Upgrade pip to the latest version
          python3 -m pip install --upgrade pip
          
          # 2. Install the "Kitchen Sink" - every library used in your code
          python3 -m pip install \
            pandas \
            sqlalchemy \
            psycopg2-binary \
            requests \
            beautifulsoup4 \
            lxml \
            polars \
            numpy \
            selectolax \
            xgboost \
            joblib \
            urllib3
          
          # 3. Start the orchestrator
          python3 season_orchestrator.py