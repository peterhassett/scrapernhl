name: NHL Season Sync
on:
  schedule:
    - cron: '0 10 * * *' # Runs daily at 5:00 AM EST (10:00 UTC)
  workflow_dispatch:      # Provides the manual "Run workflow" button

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install and Run Sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas sqlalchemy psycopg2-binary requests beautifulsoup4 lxml
          python season_orchestrator.py