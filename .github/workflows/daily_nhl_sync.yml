name: NHL Daily and Catchup Sync

on:
  schedule:
    # Runs at 10:00 UTC (approx 5:00 AM EST) every day
    - cron: '0 10 * * *'
  # This enables the "Run workflow" button in the Actions tab for manual catch-up
  workflow_dispatch:

jobs:
  scrape_and_sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # Caching helps speed up future daily runs
          cache: 'pip'

      - name: Install and Run Sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # Ensures the root and the /scrapernhl package are visible
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Use python3 -m pip to ensure packages link to the correct interpreter
          python3 -m pip install --upgrade pip
          python3 -m pip install pandas sqlalchemy psycopg2-binary requests beautifulsoup4 lxml polars numpy
          
          # Execute the orchestrator
          python3 season_orchestrator.py