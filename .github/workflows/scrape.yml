name: NHL Daily Scraper
on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          pip install pandas polars xgboost sqlalchemy psycopg2-binary joblib requests beautifulsoup4 selectolax
      - name: Run
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PYTHONPATH: ${{ github.workspace }}/scrapernhl
        run: python -u main_runner.py
