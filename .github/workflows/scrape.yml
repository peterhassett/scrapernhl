name: NHL Daily Scraper

on:
  schedule:
    - cron: '0 10 * * *' # 5:00 AM EST
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./scrapernhl

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpq-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas polars xgboost sqlalchemy psycopg2-binary joblib requests beautifulsoup4 selectolax

      - name: Run Scraper
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        # GitHub now knows to look for scraper.py inside /scrapernhl/
        run: python scraper.py
