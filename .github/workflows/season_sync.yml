name: NHL Season Sync
on:
  schedule:
    # This runs at 10:00 UTC (5:00 AM EST) every day
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas sqlalchemy psycopg2-binary requests

      - name: Run Catch-up Sync
        env:
          # This pulls the Supabase URL from GitHub Secrets
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python season_orchestrator.py